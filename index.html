<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ntfy Console // Matrix Theme</title>
    <style>
        /* Variáveis de Cores - Tema Matrix */
        :root {
            --bg-color: #0D0208;
            --text-color: #00FF41;
            --border-color: #008F11;
            --hover-bg: #00FF41;
            --hover-text: #0D0208;
            --error-color: #FF003C;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #000000;
            border: 1px solid var(--border-color);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 5vh;
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--text-color);
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            color: var(--text-color);
            border: none;
            border-right: 1px solid var(--border-color);
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn:last-child {
            border-right: none;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--border-color);
            color: var(--hover-text);
            font-weight: bold;
        }

        /* Conteúdo das abas */
        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], 
        input[type="datetime-local"],
        textarea, 
        select {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }
        
        /* Ajuste do ícone de calendário no input type date */
        ::-webkit-calendar-picker-indicator {
            filter: invert(50%) sepia(100%) saturate(500%) hue-rotate(80deg) brightness(100%) contrast(100%);
            cursor: pointer;
        }

        input:focus, textarea:focus, select:focus {
            box-shadow: 0 0 8px var(--border-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Botões de Modelos Rápidos */
        .presets-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            padding: 15px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            background: rgba(0, 143, 17, 0.05);
        }

        .preset-title {
            font-size: 0.9rem;
            width: 100%;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-color);
            opacity: 0.9;
        }

        .preset-btn {
            flex: 1;
            min-width: 110px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            font-family: var(--font-main);
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-align: center;
        }

        .preset-btn:hover {
            background-color: var(--border-color);
            color: var(--hover-text);
            box-shadow: 0 0 8px var(--border-color);
            font-weight: bold;
        }

        .preset-btn.danger {
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .preset-btn.danger:hover {
            background-color: var(--error-color);
            color: #fff;
            box-shadow: 0 0 8px var(--error-color);
        }

        .info-text {
            display: block;
            margin-top: 5px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        button.action-btn {
            width: 100%;
            padding: 15px;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: var(--font-main);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button.action-btn:hover {
            background-color: var(--hover-bg);
            color: var(--hover-text);
            box-shadow: 0 0 10px var(--hover-bg);
        }

        /* Lista de Contatos */
        .contact-list {
            list-style: none;
            margin-top: 20px;
        }

        .contact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px dashed var(--border-color);
            margin-bottom: 10px;
            border-radius: 4px;
            word-break: break-all;
            background: rgba(0, 143, 17, 0.02);
        }

        .contact-info strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .contact-info span {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .delete-btn {
            background: transparent;
            color: var(--error-color);
            border: 1px solid var(--error-color);
            padding: 8px 12px;
            cursor: pointer;
            font-family: var(--font-main);
            border-radius: 4px;
            margin-left: 10px;
            font-weight: bold;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background-color: var(--error-color);
            color: white;
            box-shadow: 0 0 5px var(--error-color);
        }

        /* Status Message */
        #status-message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            min-height: 20px;
            padding: 10px;
            border-radius: 4px;
        }
        
        .success { color: #fff; background-color: rgba(0, 143, 17, 0.3); border: 1px solid var(--border-color); }
        .error { color: #fff; background-color: rgba(255, 0, 60, 0.3); border: 1px solid var(--error-color); }

        /* Responsividade */
        @media (max-width: 480px) {
            .container { margin-top: 0; border-radius: 0; border: none; }
            body { padding: 0; }
            .form-row { flex-direction: column; gap: 0; }
            .preset-btn { flex: 1 1 45%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>[ Ntfy Console ]</h1>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'send')">1. ENVIAR</button>
            <button class="tab-btn" onclick="switchTab(event, 'manage')">2. CONTATOS</button>
        </div>

        <div id="tab-send" class="tab-content active">

            <div class="presets-container">
                <div class="preset-title">> Modelos Rápidos de Alerta:</div>
                <button class="preset-btn" onclick="applyPreset('rota')">🏍️ Rota Pega</button>
                <button class="preset-btn" onclick="applyPreset('voto')">🎯 Voto Conf.</button>
                <button class="preset-btn" onclick="applyPreset('admin')">💬 Msg Admin</button>
                <button class="preset-btn danger" onclick="applyPreset('limpar')">❌ Limpar / Agora</button>
            </div>

            <div class="form-group">
                <label for="contact-select">Destinatário:</label>
                <select id="contact-select">
                    <option value="">-- Selecione um contato --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Mensagem:</label>
                <textarea id="message" placeholder="Ex: ACESSE O APP AGORA!"></textarea>
            </div>

            <div class="form-group">
                <label for="msg-title">Título (Title):</label>
                <input type="text" id="msg-title" placeholder="Título da Notificação">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="msg-priority">Prioridade (Priority):</label>
                    <select id="msg-priority">
                        <option value="5" selected>5 - Máxima (Força Alarme)</option>
                        <option value="4">4 - Alta</option>
                        <option value="3">3 - Padrão</option>
                        <option value="2">2 - Baixa</option>
                        <option value="1">1 - Mínima</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="msg-tags">Tags (Separadas por vírgula):</label>
                    <input type="text" id="msg-tags" placeholder="Ex: dart,eyes">
                </div>
            </div>

            <div class="form-group" style="background: rgba(0, 143, 17, 0.05); padding: 15px; border-radius: 6px; border: 1px dashed var(--border-color);">
                <label for="msg-delay">⏱️ Agendar Envio:</label>
                <input type="datetime-local" id="msg-delay">
                <span class="info-text">Mostra a hora atual. Avance a hora para <b>agendar no futuro</b>, ou deixe no horário atual/apague para enviar <b>imediatamente</b>.</span>
            </div>

            <button class="action-btn" onclick="sendMessage()">Transmitir Alerta</button>
            
            <div id="status-message"></div>
        </div>

        <div id="tab-manage" class="tab-content">
            <div class="form-group">
                <label for="contact-name">Nome do Contato:</label>
                <input type="text" id="contact-name" placeholder="Ex: Matheus">
            </div>

            <div class="form-group">
                <label for="contact-url">URL do Ntfy:</label>
                <input type="text" id="contact-url" placeholder="Ex: https://ntfy.sh/meu_topico_secreto">
            </div>

            <button class="action-btn" onclick="addContact()">Salvar Contato</button>

            <ul class="contact-list" id="contact-list"></ul>
        </div>
    </div>

    <script>
        // Inicializar contatos do LocalStorage
        let contacts = JSON.parse(localStorage.getItem('ntfyContacts')) || [];

        // FUNÇÃO NOVA: Pega a data/hora atual no formato exigido pelo campo HTML
        function getCurrentDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        // Inicializa a interface
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            applyPreset('limpar'); 
        });

        // Aplicar modelos rápidos
        function applyPreset(type) {
            const msgInput = document.getElementById('message');
            const titleInput = document.getElementById('msg-title');
            const prioritySelect = document.getElementById('msg-priority');
            const tagsInput = document.getElementById('msg-tags');
            const delayInput = document.getElementById('msg-delay');

            if (type === 'rota') {
                msgInput.value = "Selecionado por Administrador. ACESSE O APP AGORA!";
                titleInput.value = "ROTA PEGA! NOME ENVIADO";
                prioritySelect.value = "5"; 
                tagsInput.value = "rotating_light,motorcycle,white_check_mark";
                delayInput.value = getCurrentDateTime(); // Reseta pro horário de agora
            } 
            else if (type === 'voto') {
                msgInput.value = "Voto confirmado no sistema.";
                titleInput.value = "VOTO REGISTRADO!";
                prioritySelect.value = "5";
                tagsInput.value = "dart,heavy_check_mark";
                delayInput.value = getCurrentDateTime();
            } 
            else if (type === 'admin') {
                msgInput.value = "Atenção: Verifique o painel imediatamente.";
                titleInput.value = "CHAMADO DE ADMIN";
                prioritySelect.value = "4"; 
                tagsInput.value = "speech_balloon,eyes,warning";
                delayInput.value = getCurrentDateTime();
            } 
            else if (type === 'limpar') {
                msgInput.value = "";
                titleInput.value = "";
                prioritySelect.value = "3"; 
                tagsInput.value = "";
                delayInput.value = getCurrentDateTime(); // Preenche a hora exata do clique
            }
        }

        // Alternar entre abas
        function switchTab(e, tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            e.currentTarget.classList.add('active');
            
            document.getElementById('status-message').innerText = ''; 
            document.getElementById('status-message').className = ''; 
        }

        // Adicionar novo contato
        function addContact() {
            const nameInput = document.getElementById('contact-name');
            const urlInput = document.getElementById('contact-url');
            const name = nameInput.value.trim();
            let url = urlInput.value.trim();

            if (!name || !url) {
                alert('Por favor, preencha o nome e a URL.');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            contacts.push({ name, url });
            saveContacts();
            updateUI();

            nameInput.value = '';
            urlInput.value = '';
            nameInput.focus();
        }

        // Deletar contato
        function deleteContact(index) {
            if(confirm('Excluir este contato do sistema?')) {
                contacts.splice(index, 1);
                saveContacts();
                updateUI();
            }
        }

        // Salvar no LocalStorage
        function saveContacts() {
            localStorage.setItem('ntfyContacts', JSON.stringify(contacts));
        }

        // Atualizar Select e Lista
        function updateUI() {
            const select = document.getElementById('contact-select');
            const list = document.getElementById('contact-list');
            
            select.innerHTML = '<option value="">-- Selecione um contato --</option>';
            list.innerHTML = '';

            contacts.forEach((contact, index) => {
                const option = document.createElement('option');
                option.value = contact.url;
                option.textContent = contact.name;
                select.appendChild(option);

                const li = document.createElement('li');
                li.className = 'contact-item';
                li.innerHTML = `
                    <div class="contact-info">
                        <strong>${contact.name}</strong>
                        <span>${contact.url}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteContact(${index})">X</button>
                `;
                list.appendChild(li);
            });
        }

        // Enviar a mensagem com os Headers
        async function sendMessage() {
            const message = document.getElementById('message').value.trim();
            const url = document.getElementById('contact-select').value;
            const title = document.getElementById('msg-title').value.trim();
            const priority = document.getElementById('msg-priority').value;
            const tags = document.getElementById('msg-tags').value.trim();
            const delayInput = document.getElementById('msg-delay').value;
            const statusDiv = document.getElementById('status-message');

            if (!url) {
                showStatus('Erro: Selecione um destinatário primeiro.', 'error');
                return;
            }

            // Lógica inteligente de agendamento (Delay)
            let delayHeader = null;
            
            if (delayInput) {
                const scheduledTime = new Date(delayInput).getTime() / 1000;
                const currentTime = new Date().getTime() / 1000;
                
                // Se a data/hora programada for maior que o momento atual (com 10 seg de margem)
                if (scheduledTime > currentTime + 10) {
                    delayHeader = Math.floor(scheduledTime).toString();
                    statusDiv.innerHTML = 'Agendando pulso no servidor...';
                } else {
                    // Se for igual a agora ou no passado, ele simplesmente ignora e manda agora.
                    statusDiv.innerHTML = 'Transmitindo pulso imediato...';
                }
            } else {
                statusDiv.innerHTML = 'Transmitindo pulso imediato...';
            }
            
            statusDiv.className = '';

            // Construção dos headers idênticos ao código Python do robô
            const headers = {
                "Priority": priority
            };
            if (title) headers["Title"] = title;
            if (tags) headers["Tags"] = tags;
            if (delayHeader) headers["Delay"] = delayHeader; // Só adiciona se for um agendamento real pro futuro

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: message || "Pulso em branco emitido pelo console",
                    headers: headers
                });

                if (response.ok) {
                    if (delayHeader) {
                        showStatus('Sinal AGENDADO com sucesso no servidor!', 'success');
                    } else {
                        showStatus('Sinal transmitido IMEDIATAMENTE com sucesso!', 'success');
                    }
                } else {
                    showStatus(`Falha na transmissão: ${response.status}`, 'error');
                }
            } catch (error) {
                showStatus('Erro de conexão com o servidor.', 'error');
                console.error(error);
            }
        }

        // Exibir mensagens de status
        function showStatus(text, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = text;
            statusDiv.className = type;
            
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = '';
            }, 6000); 
        }
    </script>
</body>
</html>
